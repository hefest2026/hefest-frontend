name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: ["**"]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      # Equivalent to frozen sync
      - run: bun install --frozen-lockfile

      # Assumes you have "lint" and "format" scripts in package.json
      # (e.g., using ESLint, Biome, or Prettier)
      - name: Lint
        run: bun run lint
      - name: Format check
        run: bun run format

  typecheck:
    name: TypeScript (static types)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      # Assumes "type-check": "tsc --noEmit" in package.json
      - name: Type check
        run: bun run type-check
