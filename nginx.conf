# Serves the Vite SPA bundle under /hefest-frontend/.
#
# Traefik routes PathPrefix(`/hefest-frontend`) here without stripping the
# prefix, and Vite builds every asset URL with that same base, so the files
# live in /usr/share/nginx/html/hefest-frontend and the location matches 1:1.
# Deep links (client-side routes) fall back to index.html.

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Lightweight liveness endpoint for the compose healthcheck.
    location = /hefest-frontend/health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Normalise the bare prefix to the trailing-slash form.
    location = /hefest-frontend {
        return 308 /hefest-frontend/;
    }

    location /hefest-frontend/ {
        # Hashed assets are immutable; cache them hard. index.html is not hashed,
        # so it must never be cached or clients pin to a stale bundle.
        location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        try_files $uri $uri/ /hefest-frontend/index.html;
        add_header Cache-Control "no-cache";
    }
}
